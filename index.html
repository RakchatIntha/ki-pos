<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>POS ครัวอินทรักษ์</title>

    <link rel="stylesheet" href="css/variables.css?v=2">
    <link rel="stylesheet" href="css/base.css?v=2">
    <link rel="stylesheet" href="css/layout.css?v=2">
    <link rel="stylesheet" href="css/components.css?v=2">
    <link rel="stylesheet" href="css/screen-role-select.css?v=2">
    <link rel="stylesheet" href="css/screen-table.css?v=2">
    <link rel="stylesheet" href="css/screen-order.css?v=2">
    <link rel="stylesheet" href="css/screen-checkout.css?v=2">
    <link rel="stylesheet" href="css/screen-receipt.css?v=2">
    <link rel="stylesheet" href="css/screen-kitchen.css?v=2">
    <link rel="stylesheet" href="css/screen-menu-manage.css?v=2">
    <link rel="stylesheet" href="css/print.css?v=2">
</head>
<body>
    <div id="app">
        <header id="app-header" class="no-print">
            <div class="header-left">
                <h1 class="app-title">ครัวอินทรักษ์ POS</h1>
                <span id="app-role-badge" class="role-badge" style="display:none"></span>
            </div>
            <div class="header-right">
                <span id="app-header-info"></span>
                <button id="btn-change-role" class="btn-change-role" style="display:none">เปลี่ยนหน้าที่</button>
            </div>
        </header>
        <main id="app-content"></main>
    </div>

    <!-- rotate-prompt ถูกปิด — รองรับทั้งแนวตั้งและแนวนอน -->
    <div id="rotate-prompt" class="rotate-prompt" style="display:none !important"></div>

    <div id="toast-container" class="toast-container"></div>

    <!-- Load scripts in dependency order (no ES modules = works with file://) -->
    <!-- Utilities -->
    <script src="js/utils/id-generator.js?v=2"></script>
    <script src="js/utils/formatter.js?v=2"></script>
    <script src="js/utils/dom-helpers.js?v=2"></script>

    <!-- Data Layer -->
    <script src="js/data/local-storage.js?v=2"></script>
    <script src="js/data/config.js?v=2"></script>
    <script src="js/data/constants.js?v=2"></script>
    <script src="js/data/api-client.js?v=2"></script>
    <script src="js/data/mock-menu.js?v=2"></script>
    <script src="js/data/mock-sysvar.js?v=2"></script>
    <script src="js/data/data-service.js?v=2"></script>

    <!-- Router -->
    <script src="js/router.js?v=2"></script>

    <!-- Services -->
    <script src="js/services/sync-service.js?v=2"></script>
    <script src="js/services/role-service.js?v=2"></script>
    <script src="js/services/order-service.js?v=2"></script>
    <script src="js/services/payment-service.js?v=2"></script>
    <script src="js/services/receipt-service.js?v=2"></script>

    <!-- Screens -->
    <script src="js/screens/role-select.js?v=2"></script>
    <script src="js/screens/table-select.js?v=2"></script>
    <script src="js/screens/order.js?v=2"></script>
    <script src="js/screens/checkout.js?v=2"></script>
    <script src="js/screens/receipt.js?v=2"></script>
    <script src="js/screens/kitchen.js?v=2"></script>
    <script src="js/screens/menu-manage.js?v=2"></script>

    <!-- App Entry -->
    <script src="js/app.js?v=2"></script>
</body>
</html>
